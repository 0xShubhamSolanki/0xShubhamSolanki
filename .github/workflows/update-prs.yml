name: Update Merged PRs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Merged PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/search/issues?q=is:pr+is:merged+author:0xShubhamSolanki&sort=updated&order=desc&per_page=5" > prs.json
          
          cat prs.json | jq -r '
            if (.items | length) > 0 then 
              .items[] | "- 🔀 [\(.title)](\(.html_url)) in **\(.repository_url | split("/")[-2:-1] | join("/"))**"
            else 
              "- No recent merged PRs found"
            end
          ' > prs.txt

      - name: Update README
        run: |
          node -e "
          const fs = require('fs');
          let readme = fs.readFileSync('README.md', 'utf8');
          const prs = fs.readFileSync('prs.txt', 'utf8');
          
          const start = readme.indexOf('<!--START_SECTION:merged_prs-->');
          const end = readme.indexOf('<!--END_SECTION:merged_prs-->');
          
          if (start !== -1 && end !== -1) {
            const newSection = '<!--START_SECTION:merged_prs-->' + prs + '<!--END_SECTION:merged_prs-->';
            readme = readme.substring(0, start) + newSection + readme.substring(end + '<!--END_SECTION:merged_prs-->'.length);
            fs.writeFileSync('README.md', readme);
          }
          "

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🔄 Updated merged PRs" && git push || echo "No changes"
