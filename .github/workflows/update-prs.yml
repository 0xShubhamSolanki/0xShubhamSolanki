name: Update All PRs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch All PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Fetching PRs for 0xShubhamSolanki..."
          
          # API call with debug
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/search/issues?q=is:pr+author:0xShubhamSolanki&sort=updated&order=desc&per_page=10" > prs.json
          
          # Check if we got valid JSON
          if jq -e '.items' prs.json >/dev/null 2>&1; then
            echo "✅ API Response valid"
            cat prs.json | jq '.items | length' | xargs echo "Total PRs found:"
          else
            echo "❌ API Error:"
            cat prs.json
            exit 1
          fi
          
          # Generate PR list with status icons
          cat prs.json | jq -r '
            .items[] | 
            (if .state == "open" then "🟢 Open" 
             elif .pull_request.merged_at != null then "🟣 Merged" 
             else "🔴 Closed" 
             end) as $status |
            "- [\(.title)](\(.html_url)) - **\($status)** in `\(.repository_url | split("/")[-2:-1] | join("/"))`"
          ' > prs.txt
          
          echo "📝 Generated PR list:"
          cat prs.txt

      - name: Update README
        run: |
          echo "🔧 Updating README..."
          
          # Check if markers exist
          if grep -q "<!--START_SECTION:prs-->" README.md && grep -q "<!--END_SECTION:prs-->" README.md; then
            echo "✅ Found markers in README"
            
            # Using sed to replace content between markers (cross-platform)
            sed -i '/<!--START_SECTION:prs-->/,/<--END_SECTION:prs-->/{
              /<!--START_SECTION:prs-->/!{
                /<--END_SECTION:prs-->/!d
              }
              /<!--START_SECTION:prs-->/r prs.txt
            }' README.md
            
            # Alternative method if sed fails
            if [ $? -ne 0 ]; then
              echo "⚠️ Trying alternative method..."
              awk '
              BEGIN {p=1}
              /<!--START_SECTION:prs-->/ {print; system("cat prs.txt"); p=0; next}
              /
