name: Update All PRs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch All PRs (Open + Closed + Merged)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Saari PRs fetch karo (is:merged hata diya)
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/search/issues?q=is:pr+author:0xShubhamSolanki&sort=updated&order=desc&per_page=10" > prs.json
          
          # State ke hisaab se emoji lagao
          cat prs.json | jq -r '
            if (.items | length) > 0 then 
              .items[] | 
              (if .state == "open" then "🟢" elif .pull_request.merged_at != null then "🟣" else "🔴" end) as $icon |
              "- \($icon) [\(.title)](\(.html_url)) in **\(.repository_url | split("/")[-2:-1] | join("/"))**"
            else 
              "- No recent PRs found"
            end
          ' > prs.txt

      - name: Update README
        run: |
          node -e "
          const fs = require('fs');
          let readme = fs.readFileSync('README.md', 'utf8');
          const prs = fs.readFileSync('prs.txt', 'utf8');
          
          const start = readme.indexOf('<!--START_SECTION:prs-->');
          const end = readme.indexOf('<!--END_SECTION:prs-->');
          
          if (start !== -1 && end !== -1) {
            const newSection = '<!--START_SECTION:prs-->\n' + prs + '\n<!--END_SECTION:prs-->';
            readme = readme.substring(0, start) + newSection + readme.substring(end + '<!--END_SECTION:prs-->'.length);
            fs.writeFileSync('README.md', readme);
          }
          "

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🔄 Updated PRs list" && git push || echo "No changes"
