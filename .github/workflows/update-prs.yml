name: Update All PRs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch karo
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/search/issues?q=is:pr+author:0xShubhamSolanki&sort=updated&order=desc&per_page=10" > data.json
          
          # Check karo ki data aaya ki nahi
          echo "API Response:"
          cat data.json | head -20
          
          # PR list banao
          echo "" > pr_list.txt
          cat data.json | jq -r '.items[] | "- [\(.title)](\(.html_url))"' >> pr_list.txt || echo "- No PRs found" > pr_list.txt
          
          echo "Generated list:"
          cat pr_list.txt

      - name: Update README
        run: |
          # Python use karein (sabse reliable)
          python3 << 'EOF'
          import re
          
          with open('README.md', 'r') as f:
              content = f.read()
          
          with open('pr_list.txt', 'r') as f:
              prs = f.read().strip()
          
          # Pattern match karo aur replace karo
          pattern = r'(<!--START_SECTION:prs-->).*?(<!--END_SECTION:prs-->)'
          replacement = f'<!--START_SECTION:prs-->\\n{prs}\\n<!--END_SECTION:prs-->'
          
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          
          with open('README.md', 'w') as f:
              f.write(new_content)
          
          print("README updated!")
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "🔄 Updated PRs" && git push)
