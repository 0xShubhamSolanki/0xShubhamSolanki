name: Update Merged PRs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch merged PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/search/issues?q=is:pr+is:merged+author:0xShubhamSolanki&sort=updated&order=desc&per_page=5")

          echo "$RESPONSE" | jq -r '
            if (.items | length) == 0 then
              "- ❌ No recent merged PRs found"
            else
              .items[] |
              "- 🔀 [\(.title)](\(.html_url)) in **\(.repository_url | split("/")[-1])** (\(.closed_at | split("T")[0]))"
            end
          ' > prs.txt

      - name: Update README (replace section)
        run: |
          awk '
          /<!--START_SECTION:merged_prs-->/ {
            print;
            system("cat prs.txt");
            skip=1;
            next;
          }
          /<!--END_SECTION:merged_prs-->/ {
            skip=0;
            print;
            next;
          }
          !skip
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto-update merged PRs"
          git push
