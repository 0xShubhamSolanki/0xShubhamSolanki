name: Update Merged PRs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Important: Write permission chahiye

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  # Updated to v4

      - name: Fetch merged PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/search/issues?q=is:pr+is:merged+author:0xShubhamSolanki&sort=updated&order=desc&per_page=5")

          echo "$RESPONSE" | jq -r '
            if (.items | length) == 0 then
              "- ❌ No recent merged PRs found"
            else
              .items[] | 
              "- 🔀 [\(.title)](\(.html_url)) in **\(.repository_url | split("/")[-2:-1] | join("/"))** (\(.closed_at | split("T")[0]))"
            end
          ' > prs.txt

      - name: Update README
        run: |
          START_MARKER="<!--START_SECTION:merged_prs-->"
          END_MARKER="<!--END_SECTION:merged_prs-->"
          
          # Temp file mein content daalo
          head -n $(grep -n "$START_MARKER" README.md | tail -1 | cut -d: -f1) README.md > temp.md
          echo "" >> temp.md
          cat prs.txt >> temp.md
          echo "" >> temp.md
          tail -n +$(grep -n "$END_MARKER" README.md | head -1 | cut -d: -f1) README.md >> temp.md
          
          mv temp.md README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto-update merged PRs" && git push)
